[pytest]
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --html=tests/results/report.html
    --self-contained-html
    --cov-report=html:tests/results/coverage
    --cov-report=term-missing:skip-covered
markers =
    unit: Fast unit tests, no external services required
    integration: Requires fakeredis/testcontainers (Docker for Kafka)
    e2e: Requires full stack on localhost (docker compose up)
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
