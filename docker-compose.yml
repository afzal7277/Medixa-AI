services:
  redis:
    image: redis:7
    container_name: medixa-redis
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: medixa-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka-data:/var/lib/kafka/data

  prometheus:
    image: prom/prometheus:latest
    container_name: medixa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: medixa-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards


  data-pipeline:
    build: ./data-pipeline
    container_name: medixa-pipeline
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure
    volumes:
      - model-cache:/root/.cache/huggingface


  consumer:
    build: ./data-pipeline
    container_name: medixa-consumer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: on-failure
    volumes:
      - model-cache:/root/.cache/huggingface
    command: ["python", "consumer.py"]

  ml-service:
    build: ./ml-service
    container_name: medixa-ml
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ml-model:/app/model
      - model-cache:/root/.cache/huggingface
    restart: on-failure

  ml-trainer:
    build: ./ml-service
    container_name: medixa-trainer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ml-model:/app/model
      - model-cache:/root/.cache/huggingface
    command: ["python", "train.py"]
    restart: on-failure


  genai-service:
    build: ./genai-service
    container_name: medixa-genai
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CHROMA_PATH=/app/chromadb
    volumes:
      - chroma-data:/app/chromadb
      - model-cache:/root/.cache/huggingface
    restart: on-failure

  
  api:
    build: ./api-gateway
    container_name: medixa-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ml-service
      - genai-service
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml-service:8001
      - GENAI_SERVICE_URL=http://genai-service:8002
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: medixa-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

  
volumes:
  grafana-data:
  kafka-data:
  model-cache:
  ml-model:
  chroma-data:
