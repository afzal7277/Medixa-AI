global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'ml-service'
    static_configs:
      - targets: ['ml-service:8001']

  - job_name: 'genai-service'
    static_configs:
      - targets: ['genai-service:8002']